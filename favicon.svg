<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a1a" rx="10"/>
  <!-- Red accent bar top -->
  <rect x="0" y="0" width="64" height="6" fill="#c0392b" rx="10"/>
  <rect x="0" y="4" width="64" height="2" fill="#c0392b"/>
  <!-- F letter -->
  <text
    x="7"
    y="50"
    font-family="Georgia, 'Times New Roman', serif"
